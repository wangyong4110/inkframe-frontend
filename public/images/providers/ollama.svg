<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" rx="22" fill="#1a1a1a"/>
  <!-- ears -->
  <ellipse cx="32" cy="20" rx="9" ry="13" fill="#1a1a1a" stroke="#e5e5e5" stroke-width="3" transform="rotate(-10 32 20)"/>
  <ellipse cx="68" cy="20" rx="9" ry="13" fill="#1a1a1a" stroke="#e5e5e5" stroke-width="3" transform="rotate(10 68 20)"/>
  <!-- head -->
  <rect x="18" y="22" width="64" height="62" rx="18" fill="#1a1a1a" stroke="#e5e5e5" stroke-width="3"/>
  <!-- eyes -->
  <circle cx="37" cy="50" r="10" fill="white"/>
  <circle cx="63" cy="50" r="10" fill="white"/>
  <circle cx="38" cy="51" r="5" fill="#1a1a1a"/>
  <circle cx="64" cy="51" r="5" fill="#1a1a1a"/>
  <circle cx="39" cy="49" r="2" fill="white"/>
  <circle cx="65" cy="49" r="2" fill="white"/>
  <!-- nose -->
  <ellipse cx="50" cy="65" rx="5" ry="3" fill="#e5e5e5" opacity="0.6"/>
</svg>
